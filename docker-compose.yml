services:
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - frontend-dist:/srv/frontend
    depends_on:
      - frontend-builder
      - backend

  frontend-builder:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-dist:/app/dist
    command: sh -c "npm ci && npm run build"

  backend:
    build: ./backend
    env_file: .env
    environment:
      ALBUM_DETECTOR_URL: http://album-detector:8000
    depends_on:
      - album-detector

  album-detector:
    build: ./services/album-detector
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  caddy_data:
  frontend-dist:
